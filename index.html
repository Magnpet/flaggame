  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; }

    @keyframes flagDeal {
      0%   { transform: perspective(700px) rotateY(88deg) scale(0.82); filter: blur(5px) brightness(1.3); opacity: 0.2; }
      55%  { transform: perspective(700px) rotateY(-7deg) scale(1.04); filter: blur(0) brightness(1); opacity: 1; }
      75%  { transform: perspective(700px) rotateY(3deg) scale(1.01); }
      90%  { transform: perspective(700px) rotateY(-1deg) scale(1); }
      100% { transform: perspective(700px) rotateY(0) scale(1); filter: blur(0); opacity: 1; }
    }
    @keyframes catPop {
      0%   { transform: scale(1); }
      30%  { transform: translateY(-2px) scale(1.07); }
      60%  { transform: translateY(1px) scale(0.97); }
      80%  { transform: translateY(-1px) scale(1.02); }
      100% { transform: scale(1); }
    }
    @keyframes pickPulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%     { opacity:0.7; transform:scale(0.97); }
    }
    @keyframes fadeSlideUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity:0; }
      to   { opacity:1; }
    }
    @keyframes duelCorrect {
      0%   { transform:scale(1); }
      40%  { transform:scale(1.06); }
      100% { transform:scale(1); }
    }
    @keyframes duelWrong {
      0%,100% { transform:translateX(0); }
      20% { transform:translateX(-6px); }
      40% { transform:translateX(6px); }
      60% { transform:translateX(-4px); }
      80% { transform:translateX(4px); }
    }
    .flag-deal-anim { animation: flagDeal 0.55s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .cat-popping    { animation: catPop 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .duel-correct   { animation: duelCorrect 0.4s ease; }
    .duel-wrong     { animation: duelWrong 0.4s ease; }
    @keyframes fireFlare {
      0%   { text-shadow: 0 0 8px #fb923c, 0 0 20px #f97316, 0 0 40px #ea580c; transform:scale(1); }
      25%  { text-shadow: 0 0 12px #fbbf24, 0 0 30px #f97316, 0 0 60px #dc2626; transform:scale(1.1); }
      50%  { text-shadow: 0 0 8px #fb923c, 0 0 24px #ea580c; transform:scale(1.05); }
      75%  { text-shadow: 0 0 14px #fbbf24, 0 0 28px #f97316; transform:scale(1.12); }
      100% { text-shadow: 0 0 8px #fb923c, 0 0 20px #f97316; transform:scale(1); }
    }
    @keyframes fireSettle {
      0%,100% { text-shadow: 0 0 6px #fb923c, 0 0 14px #f97316; }
      50%     { text-shadow: 0 0 10px #fbbf24, 0 0 20px #f97316; }
    }
    .streak-fire { animation: fireFlare 0.22s ease-in-out 6 forwards; }
    .streak-glow { animation: fireSettle 2s ease-in-out infinite; }
    .cat-card { transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease; }
    .cat-card.can-place:hover { transform: translateY(-4px) scale(1.015); }
    .cat-card.can-place { cursor: pointer; }
    select { outline: none; }

// ── UTILITIES ─────────────────────────────────────────────────────
function parseRank(str) { if(!str) return 999; return parseInt(str,10)||999; }
// Per-category fallback ranks for countries missing from the data
// (e.g. 0 Olympic medals → tied last at 134th; others → true last place)
const CATEGORY_FALLBACKS = {
  'olympic':             134,  // 0 medals, tied last after rank 133
  'population':          195,
  'hdi':                 195,
  'highest-elevation':   195,
  'life-expectancy':     195,
  'land-area':           195,
  'average-temperature': 195,
  'gdp-per-capita':      195,
};

function getScore(name, rd, higher, dataType) {
  const raw = rd[name];
  const rank = raw ? parseRank(raw) : (CATEGORY_FALLBACKS[dataType] || 195);
  return higher ? rank : (196 - rank);
}
function ordinalStr(n, fallback='Unranked') {
  if (!n || n === 999) return fallback;
  const s=['th','st','nd','rd'], v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}
function rankColor(score,T) { if(!score||score===999) return T.subText; if(score<=35) return T.rankGood; if(score<=110) return T.rankMid; return T.rankBad; }
function getRankData(rankings,dataType) { const key=dataType.replace(/-([a-z])/g,(_,l)=>l.toUpperCase())+'Rankings'; return rankings[key]||{}; }

// ── RESPONSIVE SCALE HOOK ─────────────────────────────────────────
function useWindowWidth() {
  const [w, setW] = useState(() => window.innerWidth);
  useEffect(() => {
    const handler = () => setW(window.innerWidth);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  return w;
}
function useUiScale() {
  const w = useWindowWidth();
  return Math.max(1, Math.min(1.85, w / 1380));
}

function twoRandom(arr) { const a=Math.floor(Math.random()*arr.length); let b; do{b=Math.floor(Math.random()*arr.length);}while(b===a); return [arr[a],arr[b]]; }

// ── CATEGORY CARD ─────────────────────────────────────────────────
function CategoryCard({ cat, placed, score, canPlace, onPlace, theme, watermark, scale=1, t }) {
  const T = THEMES[theme];
  const [hovered, setHovered] = useState(false);
  const cardRef = useRef(null);
  const isEmpty = !placed;
  const isHoverable = canPlace && isEmpty;

  function handleClick() {
    if (!canPlace) return;
    if (cardRef.current) {
      cardRef.current.classList.add('cat-popping');
      setTimeout(() => cardRef.current?.classList.remove('cat-popping'), 380);
    }
    onPlace();
  }

  const cardStyle = {
    background: placed ? T.filledCardBg : (isHoverable && hovered ? T.accentHoverBg : T.cardBg),
    border: `1.5px solid ${isHoverable && hovered ? T.cardHoverBorder : T.cardBorder}`,
    borderRadius: `${Math.round(14*scale)}px`,
    padding: `${Math.round(16*scale)}px ${Math.round(18*scale)}px`,
    marginBottom: `${Math.round(12*scale)}px`,
    cursor: isHoverable ? 'pointer' : 'default',
    boxShadow: isHoverable && hovered ? T.cardHoverShadow : T.cardShadow,
    transform: isHoverable && hovered ? 'translateY(-3px) scale(1.01)' : 'none',
    transition: 'transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.2s',
    position: 'relative', overflow: 'hidden',
    animation: 'fadeSlideUp 0.3s ease backwards',
  };

  return (
    <div ref={cardRef} className={`cat-card${isHoverable?' can-place':''}`} style={cardStyle}
      onClick={handleClick} onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}>

      {/* Watermark: flag fills card when placed */}
      {placed && watermark && (
        <div style={{
          position:'absolute', inset:0, borderRadius:'13px',
          backgroundImage:`url(${placed.flagUrl})`,
          backgroundSize:'cover', backgroundPosition:'center',
          opacity:0.10, pointerEvents:'none',
        }}/>
      )}

      {/* Hover top line */}
      {isHoverable && hovered && (
        <div style={{ position:'absolute', top:0, left:0, right:0, height:'2px', background:T.accent, borderRadius:`${Math.round(14*scale)}px ${Math.round(14*scale)}px 0 0` }}/>
      )}

      {/* Label */}
      <div style={{ fontSize:`${Math.round(11*scale)}px`, fontWeight:700, letterSpacing:'0.07em', textTransform:'uppercase',
        color: isHoverable && hovered ? T.accent : T.labelColor, marginBottom:`${Math.round(11*scale)}px`,
        fontFamily:'Barlow, sans-serif', transition:'color 0.15s' }}>
        {t ? t(cat.id) : cat.name}
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:'14px' }}>
        <div style={{ width:`${Math.round(100*scale)}px`, height:`${Math.round(72*scale)}px`, borderRadius:`${Math.round(8*scale)}px`,
          border: isEmpty ? `1.5px dashed ${T.emptySlotBorder}` : 'none',
          background: isEmpty ? T.emptySlotBg : 'transparent',
          flexShrink:0, overflow:'hidden', display:'flex', alignItems:'center', justifyContent:'center',
          boxShadow: placed ? '0 2px 10px rgba(0,0,0,0.18)' : 'none', position:'relative' }}>
          {placed
            ? <img src={placed.flagUrl} alt={placed.name} style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }}/>
            : <div style={{ fontSize:'20px', opacity:0.15 }}>⚑</div>}
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          {placed ? (
            <>
              <div style={{ fontSize:`${Math.round(11*scale)}px`, color:T.subText, fontFamily:'Barlow, sans-serif', fontWeight:500,
                marginBottom:'4px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                {placed.name}
              </div>
              <div style={{ fontFamily:'Barlow Condensed, sans-serif', fontSize:`${Math.round(32*scale)}px`, fontWeight:800,
                color:rankColor(score,T), lineHeight:1, letterSpacing:'-0.01em' }}>
                {ordinalStr(score, t ? t('unranked') : 'Unranked')}
              </div>
            </>
          ) : (
            <div style={{ fontSize:`${Math.round(12*scale)}px`, color: isHoverable && hovered ? T.accent : T.subText,
              fontStyle: isHoverable ? 'normal' : 'italic', fontFamily:'Barlow, sans-serif',
              fontWeight: isHoverable ? 600 : 400, transition:'color 0.15s' }}>
              {isHoverable ? (t ? t('placeHere') : 'Place here →') : (t ? t('empty') : 'Empty')}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── SCORE OVERLAY ─────────────────────────────────────────────────
function ScoreOverlay({ slots, scores, categories, theme, onRestart, highScore, isNewHigh, t }) {
  const T = THEMES[theme];
  const validScores = scores.filter(s => s !== null && s !== undefined);
  const avg = validScores.length ? validScores.reduce((a,b)=>a+b,0)/validScores.length : 0;
  const [displayAvg, setDisplayAvg] = useState(0);
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => {
      let start = null;
      const dur = 2000;
      function step(ts) {
        if(!start) start=ts;
        const p=Math.min((ts-start)/dur,1);
        const ease = p<0.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
        setDisplayAvg(avg*ease);
        if(p<1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }, 200);
    return ()=>clearTimeout(t);
  }, [avg]);

  async function handleShare() {
    const lines = [`🌍 Flag Game — Average Rank: ${avg.toFixed(1)}`, '',
      ...categories.map((c,i)=>`${c.name}: ${ordinalStr(scores[i])}`)].join('\n');
    try {
      if (navigator.share) { await navigator.share({ text: lines }); }
      else { await navigator.clipboard.writeText(lines); setCopied(true); setTimeout(()=>setCopied(false), 2000); }
    } catch(e) {}
  }

  return (
    <div style={{ position:'fixed', inset:0, background:T.overlayBg, backdropFilter:'blur(10px)',
      display:'flex', alignItems:'center', justifyContent:'center', zIndex:100, animation:'fadeIn 0.4s ease' }}>
      <div style={{ background:T.scoreBg, border:`1px solid ${T.scoreBorder}`, borderRadius:'24px',
        padding:'36px 40px', textAlign:'center', maxWidth:'500px', width:'92%',
        boxShadow: theme==='dark' ? '0 32px 80px rgba(0,0,0,0.6)' : '0 24px 60px rgba(0,0,0,0.18)',
        animation:'fadeSlideUp 0.4s ease' }}>

        {/* Badge */}
        <div style={{ fontFamily:'Barlow Condensed, sans-serif', fontSize:'11px', fontWeight:700,
          letterSpacing:'0.15em', textTransform:'uppercase', color:T.accent, marginBottom:'6px' }}>
          {isNewHigh ? (t ? t('newPersonalBest') : '🏆 New Personal Best') : (t ? t('gameComplete') : 'Game Complete')}
        </div>

        {/* Big score */}
        <div style={{ fontFamily:'Barlow Condensed, sans-serif', fontSize:'88px', fontWeight:900,
          lineHeight:0.9, color:T.textPrimary, letterSpacing:'-0.02em', marginBottom:'4px' }}>
          {displayAvg.toFixed(1)}
        </div>
        <div style={{ fontSize:'13px', color:T.subText, marginBottom:'16px', fontWeight:500 }}>
          {t ? t('avgRankingNote') : 'Average ranking — lower is better'}
        </div>

        {/* Personal best row */}
        {highScore>0 && !isNewHigh && (
          <div style={{ display:'inline-flex', alignItems:'center', gap:'8px', background:T.scoreRowBg,
            padding:'6px 16px', borderRadius:'50px', marginBottom:'16px',
            fontSize:'12px', color:T.subText, fontFamily:'Barlow, sans-serif' }}>
            {t ? t('personalBest') : 'Personal best:'}
            <strong style={{ color:T.textPrimary }}>{highScore.toFixed(1)}</strong>
          </div>
        )}

        {/* Results grid — with flag thumbnails */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'7px', marginBottom:'24px' }}>
          {categories.map((cat,i) => (
            <div key={i} style={{ background:T.scoreRowBg, borderRadius:'10px', padding:'9px 12px',
              display:'flex', alignItems:'center', gap:'10px',
              animation:`fadeSlideUp 0.3s ${0.04*i}s ease backwards` }}>
              {/* Mini flag */}
              {slots[i] && (
                <img src={slots[i].flagUrl} alt={slots[i].name}
                  style={{ width:'36px', height:'26px', objectFit:'cover', borderRadius:'4px',
                    flexShrink:0, boxShadow:'0 1px 4px rgba(0,0,0,0.2)' }}/>
              )}
              <div style={{ flex:1, minWidth:0, textAlign:'left' }}>
                <div style={{ fontSize:'10px', color:T.subText, fontFamily:'Barlow, sans-serif',
                  fontWeight:500, lineHeight:1.3, marginBottom:'1px',
                  whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                  {cat.name}
                </div>
                <div style={{ fontFamily:'Barlow Condensed, sans-serif', fontWeight:800,
                  fontSize:'18px', color:rankColor(scores[i],T), lineHeight:1 }}>
                  {ordinalStr(scores[i], t ? t('unranked') : 'Unranked')}
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Buttons */}
        <div style={{ display:'flex', gap:'10px', justifyContent:'center' }}>
          <button onClick={onRestart}
            style={{ padding:'13px 40px', borderRadius:'50px', border:'none',
              background:T.btnBg, color:T.btnText, fontFamily:'Barlow Condensed, sans-serif',
              fontSize:'18px', fontWeight:800, letterSpacing:'0.1em', textTransform:'uppercase',
              cursor:'pointer', boxShadow:T.btnShadow, transition:'transform 0.15s ease' }}
            onMouseEnter={e=>e.currentTarget.style.transform='scale(1.04)'}
            onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
            {t ? t('playAgain') : 'Play Again'}
          </button>
          <button onClick={handleShare}
            style={{ padding:'13px 24px', borderRadius:'50px',
              border:`1.5px solid ${T.cardBorder}`, background:'transparent',
              color:T.textPrimary, fontFamily:'Barlow Condensed, sans-serif',
              fontSize:'18px', fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase',
              cursor:'pointer', transition:'all 0.15s ease' }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor=T.accent; e.currentTarget.style.color=T.accent; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor=T.cardBorder; e.currentTarget.style.color=T.textPrimary; }}>
            {copied ? (t ? t('copied') : '✓ Copied!') : (t ? t('share') : 'Share')}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── FLAG DUEL MODE ────────────────────────────────────────────────
function FlagDuel({ theme, rankings, uiScale=1, t }) {
  const T = THEMES[theme];
  const [catIdx, setCatIdx]     = useState(Math.floor(Math.random()*DUEL_CATS.length));
  const [pair, setPair]         = useState(() => twoRandom(COUNTRIES));
  const [streak, setStreak]     = useState(0);
  const [bestStreak, setBestStreak] = useState(()=>parseInt(localStorage.getItem('fg_duel_hs')||'0'));
  const [result, setResult]     = useState(null); // null | 'correct' | 'wrong' | 'tie'
  const [answered, setAnswered] = useState(false);
  const [correctIdx, setCorrectIdx] = useState(null);
  const [isNewBest, setIsNewBest]   = useState(false);
  const [firePlaying, setFirePlaying] = useState(false);
  const streakRef = useRef(null);

  // Responsive sizes
  const maxW      = Math.round(820  * uiScale);
  const flagH     = Math.round(160  * uiScale);
  const catSz     = Math.round(34   * uiScale);
  const subSz     = Math.round(12   * uiScale);
  const vsSz      = Math.round(30   * uiScale);
  const nameSz    = Math.round(18   * uiScale);
  const rankSz    = Math.round(26   * uiScale);
  const scoreLblSz= Math.round(11   * uiScale);
  const scoreValSz= Math.round(38   * uiScale);
  const resultSz  = Math.round(24   * uiScale);
  const btnFz     = Math.round(18   * uiScale);
  const gap       = Math.round(20   * uiScale);
  const cardPad   = Math.round(20   * uiScale);
  const cardR     = Math.round(16   * uiScale);
  const mb        = Math.round(28   * uiScale);

  function newRound() {
    setCatIdx(Math.floor(Math.random()*DUEL_CATS.length));
    setPair(twoRandom(COUNTRIES));
    setResult(null);
    setAnswered(false);
    setCorrectIdx(null);
    setIsNewBest(false);
    setFirePlaying(false);
  }

  function triggerFire() {
    if (!streakRef.current) return;
    streakRef.current.classList.remove('streak-fire','streak-glow');
    void streakRef.current.offsetWidth; // reflow
    streakRef.current.classList.add('streak-fire');
    setFirePlaying(true);
    setTimeout(() => {
      if (streakRef.current) {
        streakRef.current.classList.remove('streak-fire');
        streakRef.current.classList.add('streak-glow');
      }
      setFirePlaying(false);
    }, 1400);
  }

  function handlePick(idx) {
    if (answered) return;
    const dt = DUEL_DATA_TYPES[catIdx];
    const rd = getRankData(rankings, dt);
    const r0 = parseRank(rd[pair[0].name] || '999');
    const r1 = parseRank(rd[pair[1].name] || '999');

    // Tie detection
    if (r0 === r1) {
      setAnswered(true);
      setResult('tie');
      setCorrectIdx(-1); // neither
      return;
    }

    const correct = r0 < r1 ? 0 : 1;
    const isCorrect = idx === correct;
    setCorrectIdx(correct);
    setAnswered(true);

    if (isCorrect) {
      const ns = streak + 1;
      setStreak(ns);
      setResult('correct');
      if (ns > bestStreak) {
        setBestStreak(ns);
        localStorage.setItem('fg_duel_hs', ns);
        setIsNewBest(true);
        setTimeout(triggerFire, 100);
      }
    } else {
      setStreak(0);
      setResult('wrong');
      setIsNewBest(false);
      if (streakRef.current) streakRef.current.classList.remove('streak-fire','streak-glow');
    }
  }

  function cardBorderColor(idx) {
    if (!answered) return T.cardBorder;
    if (result === 'tie') return '#d97706'; // amber for tie
    if (correctIdx === idx) return T.rankGood;
    return T.rankBad;
  }

  function cardGlow(idx) {
    if (!answered) return T.cardShadow;
    if (result === 'tie') return '0 0 28px rgba(217,119,6,0.4)';
    if (correctIdx === idx) return `0 0 28px rgba(${theme==='dark'?'74,222,128':'22,163,74'},0.35)`;
    return `0 0 16px rgba(${theme==='dark'?'248,113,113':'220,38,38'},0.2)`;
  }

  function rankDisplay(country) {
    const dt = DUEL_DATA_TYPES[catIdx];
    const rd = getRankData(rankings, dt);
    const raw = rd[country.name];
    const r = parseRank(raw || '999');
    const unrankedStr = t ? t('unranked') : 'Unranked';
    if (result === 'tie') return <span style={{ color:'#d97706' }}>{ordinalStr(r, unrankedStr)}</span>;
    return ordinalStr(r, unrankedStr);
  }

  const catName = DUEL_CATS[catIdx];

  return (
    <div style={{ flex:1, display:'flex', alignItems:'center', overflowY:'auto',
      justifyContent:'center', padding:`${Math.round(24*uiScale)}px ${Math.round(20*uiScale)}px` }}>
      <div style={{ width:'100%', maxWidth:`${maxW}px`, animation:'fadeSlideUp 0.4s ease' }}>

        {/* ── Category question ── */}
        <div style={{ textAlign:'center', marginBottom:`${mb}px` }}>
          <div style={{ fontSize:`${subSz}px`, fontWeight:700, letterSpacing:'0.12em',
            textTransform:'uppercase', color:T.subText, marginBottom:`${Math.round(8*uiScale)}px`,
            fontFamily:'Barlow, sans-serif' }}>
            {t ? t('whichHigher') : 'Which country ranks higher in…'}
          </div>
          <div style={{ fontFamily:'Barlow Condensed, sans-serif', fontSize:`${catSz}px`, fontWeight:900,
            color:T.accent, letterSpacing:'0.02em', textTransform:'uppercase', lineHeight:1.1 }}>
            {t ? t(DUEL_CAT_KEYS[catIdx]) : DUEL_CATS[catIdx]}
          </div>
        </div>

        {/* ── Flags row — 3 cols: left | VS | right ── */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr auto 1fr',
          gap:`${gap}px`, alignItems:'center', marginBottom:`${mb}px` }}>

          {/* Left flag */}
          {[0, 1].map(idx => (
            <React.Fragment key={idx}>
              {idx === 1 && (
                /* VS divider — rendered once between the two flags */
                <div style={{ fontFamily:'Barlow Condensed, sans-serif', fontSize:`${vsSz}px`,
                  fontWeight:900, color:T.subText, textAlign:'center', letterSpacing:'0.08em',
                  userSelect:'none', opacity:0.7 }}>
                  VS
                </div>
              )}
              <div
                onClick={()=>handlePick(idx)}
                style={{ background:T.cardBg, border:`2px solid ${cardBorderColor(idx)}`,
                  borderRadius:`${cardR}px`, padding:`${cardPad}px`,
                  textAlign:'center', cursor: answered?'default':'pointer',
                  transition:'all 0.2s ease', boxShadow: cardGlow(idx) }}
                onMouseEnter={e=>{ if(!answered){
                  e.currentTarget.style.borderColor=T.accent;
                  e.currentTarget.style.transform='translateY(-4px) scale(1.02)';
                }}}
                onMouseLeave={e=>{ if(!answered){
                  e.currentTarget.style.borderColor=T.cardBorder;
                  e.currentTarget.style.transform='none';
                }}}>
                {/* Flag image */}
                <div style={{ width:'100%', height:`${flagH}px`,
                  marginBottom:`${Math.round(14*uiScale)}px` }}>
                  <img src={pair[idx].flagUrl} alt={pair[idx].name}
                    style={{ width:'100%', height:'100%', objectFit:'contain', display:'block' }}/>
                </div>
                {/* Country name */}
                <div style={{ fontFamily:'Barlow Condensed, sans-serif', fontSize:`${nameSz}px`,
                  fontWeight:800, letterSpacing:'0.02em', textTransform:'uppercase',
                  color: answered && result!=='tie' && correctIdx===idx ? T.rankGood
                       : answered && result!=='tie' && correctIdx!==null && correctIdx!==idx ? T.rankBad
                       : answered && result==='tie' ? '#d97706'
                       : T.textPrimary,
                  transition:'color 0.3s', lineHeight:1.2, marginBottom: answered?`${Math.round(6*uiScale)}px`:0 }}>
                  {pair[idx].name}
                </div>
                {/* Rank — revealed on answer */}
                {answered && (
                  <div style={{ fontFamily:'Barlow Condensed, sans-serif', fontSize:`${rankSz}px`,
                    fontWeight:900, marginTop:`${Math.round(4*uiScale)}px`, lineHeight:1,
                    color: result==='tie' ? '#d97706' : correctIdx===idx ? T.rankGood : T.rankBad }}>
                    {rankDisplay(pair[idx])}
                  </div>
                )}
              </div>
            </React.Fragment>
          ))}
        </div>

        {/* ── Streak row ── */}
        <div style={{ display:'flex', justifyContent:'center', gap:`${Math.round(48*uiScale)}px`,
          marginBottom:`${Math.round(20*uiScale)}px` }}>
          {/* Streak */}
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:`${scoreLblSz}px`, textTransform:'uppercase', letterSpacing:'0.1em',

          {/* Best Streak */}
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:`${scoreLblSz}px`, textTransform:'uppercase', letterSpacing:'0.1em',

              marginBottom:`${Math.round(3*uiScale)}px` }}>
              Best Streak
            </div>
            <div style={{ fontFamily:'Barlow Condensed, sans-serif', fontSize:`${scoreValSz}px`,
              fontWeight:900, color:T.subText, lineHeight:1 }}>
              {bestStreak}
            </div>
          </div>
        </div>

        {/* ── Result feedback + Next button ── */}
        {answered ? (
          <div style={{ textAlign:'center', animation:'fadeSlideUp 0.3s ease' }}>
            <div style={{ fontFamily:'Barlow Condensed, sans-serif', fontSize:`${resultSz}px`,
              fontWeight:800, letterSpacing:'0.04em', marginBottom:`${Math.round(18*uiScale)}px`,
              color: result==='correct' ? T.rankGood : result==='wrong' ? T.rankBad : '#d97706' }}>
              {result==='correct' ? (t ? t('correct') : '✓ Correct!') : result==='wrong' ? (t ? t('wrong') : '✗ Wrong!') : (t ? t('tie') : '— Tie!')}
            </div>
            {result==='tie' && (
              <div style={{ fontSize:`${Math.round(12*uiScale)}px`, color:T.subText,
                fontFamily:'Barlow, sans-serif', marginBottom:`${Math.round(14*uiScale)}px` }}>

              </div>
            )}
            <button onClick={newRound}
              style={{ padding:`${Math.round(13*uiScale)}px ${Math.round(48*uiScale)}px`,
                borderRadius:'50px', border:'none', background:T.btnBg, color:T.btnText,
                fontFamily:'Barlow Condensed, sans-serif', fontSize:`${btnFz}px`, fontWeight:800,

                boxShadow:T.btnShadow, transition:'transform 0.15s ease' }}

              onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>

            </button>
          </div>
        ) : (
          <div style={{ textAlign:'center', fontFamily:'Barlow, sans-serif',
            fontSize:`${Math.round(13*uiScale)}px`, color:T.subText, opacity:0.7 }}>
            {t ? t('clickToAnswer') : 'Click a flag to answer'}
          </div>
        )}
      </div>
    </div>
  );
}

// ── CLASSIC GAME ──────────────────────────────────────────────────
function ClassicGame({ theme, rankings, flagSize, cardWatermark, showHighScore, uiScale=1, onFilledChange, t }) {
  const T = THEMES[theme];
  const [categories, setCategories] = useState([]);
  const [slots, setSlots] = useState(Array(8).fill(null));
  const [scores, setScores] = useState(Array(8).fill(999));
  const [currentCountry, setCurrentCountry] = useState(null);
  const [isRolling, setIsRolling] = useState(false);
  const [phase, setPhase] = useState('idle');
  const [skipsLeft, setSkipsLeft] = useState(3);
  const [rolledSet, setRolledSet] = useState(new Set());
  const [highScore, setHighScore] = useState(()=>parseFloat(localStorage.getItem('fg_r_hs')||'0'));
  const [isNewHigh, setIsNewHigh] = useState(false);
  const [flagRevealKey, setFlagRevealKey] = useState(0);
  const rollIntervalRef = useRef(null);

  useEffect(()=>{ initGame(); }, []);
  useEffect(()=>()=>clearInterval(rollIntervalRef.current), []);

  function initGame() {
    clearInterval(rollIntervalRef.current);
    setCategories(CATEGORY_PAIRS.map(pair=>{ const v=pair.variants[Math.floor(Math.random()*2)]; return {...v,dataType:pair.dataType}; }));
    setSlots(Array(8).fill(null)); setScores(Array(8).fill(999));
    setCurrentCountry(null); setPhase('idle');
    setSkipsLeft(3); setRolledSet(new Set()); setIsRolling(false); setIsNewHigh(false);
    onFilledChange && onFilledChange(0);
  }

  function startRoll() {
    if (isRolling) return;
    clearInterval(rollIntervalRef.current);
    if (phase==='placing') setSkipsLeft(s=>s-1);
    setIsRolling(true); setCurrentCountry(null); setPhase('rolling');

    const available = COUNTRIES.map((_,i)=>i).filter(i=>!rolledSet.has(i));
    if (!available.length) { setIsRolling(false); setPhase('idle'); return; }

    let elapsed=0, lastTick=performance.now(), interval=50;
    const total=2000;

    function tick() {
      const now=performance.now(), delta=now-lastTick; elapsed+=delta; lastTick=now;
      if(elapsed<600) interval=50; else if(elapsed<1100) interval=90;
      else if(elapsed<1500) interval=160; else interval=300;

      if (elapsed<total) {
        const ri=available[Math.floor(Math.random()*available.length)];
        const img=document.getElementById('rolling-flag-img');
        if(img){ img.src=COUNTRIES[ri].flagUrl; img.style.display='block'; img.style.animation='none'; }
        rollIntervalRef.current=setTimeout(tick,interval);
      } else {
        const fi=available[Math.floor(Math.random()*available.length)];
        const fc=COUNTRIES[fi];
        setRolledSet(prev=>new Set([...prev,fi]));
        setCurrentCountry(fc); setFlagRevealKey(k=>k+1);
        setPhase('placing'); setIsRolling(false);
      }
    }
    rollIntervalRef.current=setTimeout(tick,interval);
  }

  function placeFlag(si) {
    if (phase!=='placing'||slots[si]||!currentCountry) return;
    const cat=categories[si];
    const rd=getRankData(rankings,cat.dataType);
    const score=getScore(currentCountry.name,rd,cat.higher,cat.dataType);
    const ns=[...slots]; ns[si]=currentCountry;
    const nsc=[...scores]; nsc[si]=score;
    setSlots(ns); setScores(nsc);
    setCurrentCountry(null); setPhase('idle');
    onFilledChange && onFilledChange(ns.filter(Boolean).length);
    if (ns.filter(Boolean).length===8) {
      const valid=nsc.filter(s=>s!==999);
      const avg=valid.reduce((a,b)=>a+b,0)/valid.length;
      setTimeout(()=>{
        setPhase('complete');
        if (!highScore||avg<highScore){ setHighScore(avg); localStorage.setItem('fg_r_hs',avg.toString()); setIsNewHigh(true); }
      },350);
    }
  }

  const lc=categories.slice(0,4), rc=categories.slice(4,8);
  const filledCount=slots.filter(Boolean).length;

  return (
    <>
      {/* Score widget in header slot — exposed via prop */}
      <div style={{ flex:1, overflowY:'auto', display:'flex', alignItems:'center', justifyContent:'center', padding:'20px 14px' }}>
        <div style={{ width:'100%', maxWidth:`${Math.round(1200*uiScale)}px`, display:'grid', gridTemplateColumns:'1fr auto 1fr', gap:`${Math.round(16*uiScale)}px`, alignItems:'center' }}>
          <div style={{ paddingTop:'8px' }}>
            {lc.map((cat,i)=>(
              <CategoryCard key={cat.id} cat={cat} placed={slots[i]} score={scores[i]}
                canPlace={phase==='placing'&&!slots[i]} onPlace={()=>placeFlag(i)}
                theme={theme} watermark={cardWatermark} scale={uiScale} t={t}/>
            ))}
          </div>
          <FlagCenter key={`fc-${flagRevealKey}`} country={currentCountry} isRolling={isRolling}
            onRoll={startRoll} skipsLeft={skipsLeft} phase={phase} theme={theme} flagSize={Math.round(flagSize*uiScale)} scale={uiScale} t={t}/>
          <div style={{ paddingTop:'8px' }}>
            {rc.map((cat,i)=>(
              <CategoryCard key={cat.id} cat={cat} placed={slots[i+4]} score={scores[i+4]}
                canPlace={phase==='placing'&&!slots[i+4]} onPlace={()=>placeFlag(i+4)}
                theme={theme} watermark={cardWatermark} scale={uiScale} t={t}/>
            ))}
          </div>
        </div>
      </div>

      {phase==='complete' && (
        <ScoreOverlay slots={slots} scores={scores} categories={categories} theme={theme}
          onRestart={initGame} highScore={highScore} isNewHigh={isNewHigh} t={t}/>
      )}
    </>
  );
}

              color:T.subText, opacity:0.4, marginBottom:'12px' }}>{t('comingSoon')}</div>
            <div style={{ fontFamily:'Barlow, sans-serif', fontSize:'14px', color:T.subText }}>
              {MODES.find(m=>m.id===gameMode)?.label} {t('comingSoonSub')}
            </div>
          </div>
        </div>
      )}
      </div>

      {/* ── MILESTONES MODAL ── */}
      {showMilestones && (
        <div style={{ position:'fixed', inset:0, background:T.overlayBg, backdropFilter:'blur(10px)',
          display:'flex', alignItems:'center', justifyContent:'center', zIndex:100, animation:'fadeIn 0.3s ease' }}
          onClick={()=>setShowMilestones(false)}>
          <div onClick={e=>e.stopPropagation()}
            style={{ background:T.scoreBg, border:`1px solid ${T.scoreBorder}`, borderRadius:'24px',
              padding:'36px 40px', maxWidth:'420px', width:'90%',
              boxShadow: theme==='dark'?'0 32px 80px rgba(0,0,0,0.6)':'0 24px 60px rgba(0,0,0,0.18)',
              animation:'fadeSlideUp 0.3s ease' }}>
            <div style={{ fontFamily:'Barlow Condensed, sans-serif', fontSize:'11px', fontWeight:700,
              letterSpacing:'0.15em', textTransform:'uppercase', color:T.accent, marginBottom:'8px' }}>
              Milestones
            </div>
            <div style={{ fontFamily:'Barlow Condensed, sans-serif', fontSize:'28px', fontWeight:900,
              color:T.textPrimary, marginBottom:'20px' }}>{t('yourBestScores')}</div>
            {[[t('flagGame'), parseFloat(localStorage.getItem('fg_r_hs')||'0'), true],
              [t('flagDuel'), parseInt(localStorage.getItem('fg_duel_hs')||'0'), false]].map(([label,val,isFloat])=>(
              <div key={label} style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
                background:T.scoreRowBg, borderRadius:'10px', padding:'12px 16px', marginBottom:'8px' }}>
                <span style={{ fontFamily:'Barlow, sans-serif', fontSize:'13px', color:T.subText, fontWeight:500 }}>{label}</span>
                <span style={{ fontFamily:'Barlow Condensed, sans-serif', fontSize:'24px', fontWeight:800,
                  color: val>0 ? T.accent : T.subText }}>
                  {val>0 ? (isFloat?val.toFixed(1):val) : '—'}
                </span>
              </div>
            ))}
            <button onClick={()=>setShowMilestones(false)}
              style={{ marginTop:'16px', width:'100%', padding:'12px', borderRadius:'50px', border:'none',
                background:T.btnBg, color:T.btnText, fontFamily:'Barlow Condensed, sans-serif',
                fontSize:'16px', fontWeight:800, letterSpacing:'0.08em', textTransform:'uppercase',
                cursor:'pointer', boxShadow:T.btnShadow }}>
              {t('close')}
            </button>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
